version: "3.9"

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  worker_secret:
    file: ./secrets/worker_secret.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt

networks:
  neutrino-test:
    driver: bridge

services:
  neutrino:
    image: neutrino:test
    container_name: neutrino-test
    secrets:
      - jwt_secret
      - worker_secret
      - anthropic_api_key
    environment:
      JWT_SECRET: /run/secrets/jwt_secret
      WORKER_SECRET: /run/secrets/worker_secret
      ANTHROPIC_API_KEY: /run/secrets/anthropic_api_key
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      DATABASE_URL: /usr/local/data/neutrino.db
      STORAGE_PATH: /usr/local/data/storage
      LOG_PATH: /usr/local/logs/
      PORT: 8080
    ports:
      - "9880:8080"
    volumes:
      - ${RUN_DIR}/data:/usr/local/data
      - ${RUN_DIR}/service-logs:/usr/local/logs
    networks:
      - neutrino-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
